<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
  <!-- Padlock shackle -->
  <path d="M8 1a3 3 0 0 0-3 3v1.5h1.5V4a1.5 1.5 0 0 1 3 0v1.5H11V4a3 3 0 0 0-3-3z"/>
  <!-- Padlock body -->
  <rect x="2.5" y="6" width="11" height="9" rx="1.5"/>
  <!-- Kubernetes helm wheel (white cutout via mask trick — use opacity) -->
  <g fill="var(--vscode-sideBar-background, #1e1e1e)" opacity="0.85">
    <!-- outer ring -->
    <circle cx="8" cy="10.5" r="2.8" fill="none" stroke="var(--vscode-sideBar-background, #1e1e1e)" stroke-width="0.9"/>
    <!-- center hub -->
    <circle cx="8" cy="10.5" r="0.7"/>
    <!-- 7 spokes -->
    <line x1="8" y1="10.5" x2="8"   y2="7.75" stroke="var(--vscode-sideBar-background, #1e1e1e)" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="8" y1="10.5" x2="10.5" y2="9.1"  stroke="var(--vscode-sideBar-background, #1e1e1e)" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="8" y1="10.5" x2="10.4" y2="12.1" stroke="var(--vscode-sideBar-background, #1e1e1e)" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="8" y1="10.5" x2="8"   y2="13.2"  stroke="var(--vscode-sideBar-background, #1e1e1e)" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="8" y1="10.5" x2="5.6"  y2="12.1" stroke="var(--vscode-sideBar-background, #1e1e1e)" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="8" y1="10.5" x2="5.5"  y2="9.1"  stroke="var(--vscode-sideBar-background, #1e1e1e)" stroke-width="0.7" stroke-linecap="round"/>
  </g>
</svg>
