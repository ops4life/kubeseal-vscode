repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
        exclude: mkdocs\.yml
-   repo: local
    hooks:
    -   id: mkdocs-build
        name: mkdocs build --strict
        entry: bash -c 'python3 -m venv .mkdocs-venv && source .mkdocs-venv/bin/activate && pip install -q -r requirements.txt && mkdocs build --strict && rm -rf .mkdocs-venv'
        language: system
        files: '(docs/|mkdocs\.yml|requirements\.txt)'
        pass_filenames: false

    -   id: typecheck
        name: TypeScript type check
        entry: bash -c 'npx tsc -p ./ --noEmit'
        language: system
        files: '\.(ts|json)$'
        exclude: '(node_modules|out)/'
        pass_filenames: false

    -   id: base64-tests
        name: Base64 encode/decode test suite
        entry: bash -c 'node tests/run-tests.mjs'
        language: system
        files: '(src/commands/base64\.ts|src/utils/shell\.ts|src/utils/validation\.ts|src/utils/yaml\.ts|tests/.*\.yaml|tests/run-tests\.mjs)$'
        pass_filenames: false

    -   id: npm-audit
        name: npm audit (production dependencies)
        entry: bash -c 'npm audit --omit=dev --audit-level moderate'
        language: system
        files: '^package(-lock)?\.json$'
        pass_filenames: false
